name: Build Standalone Apps and Release
on:
  workflow_dispatch:   # allow manual trigger
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest, macos-15-intel]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies and update Align frames
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller -r requirements.txt

      - name: Build executable
        shell: bash
        run: |
          case "${{ matrix.os }}" in
            macos-*)   ICON="icon/icon.icns" ;;
            windows-*) ICON="icon/icon.ico" ;;
            *)         ICON="icon/icon.png" ;;
          esac
          pyinstaller gui.py --onedir --windowed --noconfirm --name "Mower Tools" --icon="$ICON"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Mower-tools-${{ matrix.os }}
          path: dist/

  release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: build
      
      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Zip each artifact
          cd build
          for dir in */; do
            dirname="${dir%/}"
            zip -r "${dirname}.zip" "$dirname"
          done
          cd ..
          
          # Create release and upload zips
          gh release create ${{ github.ref_name }} \
            --title "Release ${{ github.ref_name }}" \
            --notes "Automated release for ${{ github.ref_name }}" \
            build/*.zip
